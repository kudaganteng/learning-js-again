<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money tracker</title>
</head>

<body>
    <h1>Money Tracker</h1>
    <hr>

    <div id="cardArea">
        <h3>Total pemasukan: <span id="pemasukanShowArea"></span></h3>
        <h3>Total pengeluaran: <span id="pengeluaranShowArea"></span></h3>
        <h3>Sisa di dompet: <span id="sisaShowArea"></span></h3>
    </div>
    <hr>
        <span>Filter total berdasarkan :</span><Select name="totalTypeTab" id="totalTypeTab" onchange="updateTotalCat()"> 
        <option value="income">Pemasukan</option>
        <option value="outcome">Pengeluaran</option>
    </Select>
    <Select name="totalCatTab" id="totalCatTab">

    </Select>
    <h4 id="totalFilterShow"></h4>
    <hr>
    <div id="inputArea">
        <select name="transactionType" id="transactionType" onchange="updateCategory()">
            <option value="outcome">Pengeluaran</option>
            <option value="income">Pemasukan</option>
        </select>
        <select name="transactionCategory" id="transactionCategory">
            <option value="default">Pilih kategori transaksi</option>
        </select>
        <input type="text" id="transaction" placeholder="Masukkan jumlah transaksi">
        <textarea name="transactionInfo" id="transactionInfo" placeholder="Masukkan informasi transaksi"></textarea>
        <button id="submitTransaction">Submit</button>
        <button id="cancelEdit" hidden>Cancel edit</button>
    </div>
    <hr>
     <span>Urutkan: </span><select name="sortType" id="sortType">
        <option value="newest">Terbaru</option>
        <option value="oldest">Terlama</option>
        <option value="highest">Terbesar</option>
        <option value="lowest">Terkecil</option>
    </select>
    <span>Filter: </span><Select name="transactionTypeTab" id="transactionTypeTab">
        <option value="default">Semua Transaksi</option>
        <option value="income">Pemasukan</option>
        <option value="outcome">Pengeluaran</option>
    </Select>
    <Select name="transactionCatTab" id="transactionCatTab">

    </Select>
    <input type="month" name="filterMonth" id="filterMonth">
    <button id="resetFilter">reset filter</button>
    <div id="transactionList">

    </div>
</body>
<script>
    const transactionArea = document.getElementById('transactionList')
    const cardArea = document.getElementById('cardArea')
    const typeSelect = document.getElementById('transactionType')
    const categorySelect = document.getElementById('transactionCategory')
    const transactionTypeTab = document.getElementById('transactionTypeTab')
    const transactionCatTab = document.getElementById('transactionCatTab')
    const sortValue = document.getElementById('sortType')
    const monthFilter = document.getElementById('filterMonth')
    const resetFilter = document.getElementById('resetFilter')
    const pemasukanShowArea = document.getElementById('pemasukanShowArea')
    const pengeluaranShowArea = document.getElementById('pengeluaranShowArea')
    const sisaShowArea = document.getElementById('sisaShowArea')
    const totalTypeTab = document.getElementById('totalTypeTab')
    const totalCatTab = document.getElementById('totalCatTab')
    const totalFilterShow = document.getElementById('totalFilterShow')
    
    let editId = null

    const savedData = localStorage.getItem('MY_TRANSACTIONS')

    const categoryMapInput = {
        outcome: ["Makanan", "Transport", "Hiburan", "Tagihan"],
        income: ["Gaji", "Bonus", "Investasi", "Hadiah"]
    }
    const categoryMapList = {
        default: ["Semua Jenis"],
        outcome: ["Semua Jenis", "Makanan", "Transport", "Hiburan", "Tagihan"],
        income: ["Semua Jenis", "Gaji", "Bonus", "Investasi", "Hadiah"]
    }
    let transactionList = savedData ? JSON.parse(savedData) : [{
        transactionId: 1,
        transactionType: 'outcome',
        transactionCategory: 'Transport',
        transaction: 12000,
        transactionInfo: 'Beli bensin'
    },
    {
        transactionId: 2,
        transactionType: 'income',
        transactionCategory: 'Gaji',
        transaction: 1000000,
        transactionInfo: 'Gaji'
    },
    {
        transactionId: 3,
        transactionType: 'outcome',
        transactionCategory: 'Tagihan',
        transaction: 200000,
        transactionInfo: 'bayar Wifi'
    }, {
        transactionId: 4,
        transactionType: 'income',
        transactionCategory: 'Investasi',
        transaction: 1000000,
        transactionInfo: 'BBCA'
    },
    {
        transactionId: 5,
        transactionType: 'income',
        transactionCategory: 'Hadiah',
        transaction: 100000,
        transactionInfo: 'Gaji'
    },
    {
        transactionId: 6,
        transactionType: 'outcome',
        transactionCategory: 'Hiburan',
        transaction: 500000,
        transactionInfo: 'bayar Wifi'
    },


    ]

    const render = () => {
        localStorage.setItem('MY_TRANSACTIONS', JSON.stringify(transactionList))
        const filteredList = transactionList.filter((item) => {
            if (!monthFilter.value) return true

            const d = new Date(item.transactionId)
            const year = d.getFullYear()

            const month = String(d.getMonth()+1).padStart(2,0)

            const itemMonthYear = `${year}-${month}`

            return itemMonthYear === monthFilter.value
        }).filter((item) => {
            if (transactionTypeTab.value === "default") {
                return true;
            }
            return item.transactionType === transactionTypeTab.value
        }).filter((cat) => {
            if (transactionCatTab.value === "Semua Jenis") {
                return true;
            }
            return cat.transactionCategory === transactionCatTab.value
        })
        
        filteredList.sort((a,b) => {
            if (sortValue.value === "newest") {
                return b.transactionId-a.transactionId
            }else if(sortValue.value === "oldest"){
                return a.transactionId-b.transactionId
            }else if(sortValue.value === "highest"){
                return b.transaction-a.transaction
            }else if (sortValue.value === "lowest") {
                return a.transaction-b.transaction
            }
        })

        const htmllist = filteredList.map((item) => {
            const savedTimestamp = item.transactionId
            return `<div class="transaction-item">
                <span>${new Date(savedTimestamp).toDateString()}: <b>${item.transactionType}</b>: Rp.${item.transaction.toLocaleString()} untuk ${item.transactionInfo}</span>
                <button class="btn-hapus" onclick="deleteTransaction(${item.transactionId})">❌</button>
                <button class="btn-edit" onclick="editTransaction(${item.transactionId})">📝</button>
              </div>`
        })
        transactionArea.innerHTML = htmllist.join("")

        const selectedFilterTotal = transactionList.filter(t => t.transactionCategory === totalCatTab.value).reduce((sum, data) => sum + data.transaction, 0)
        totalFilterShow.innerHTML = `Total berdasarkan ${totalCatTab.value}: Rp.${selectedFilterTotal.toLocaleString()}` 

        const totalIncome = transactionList.filter(t => t.transactionType === "income").reduce((sum, data) => sum + data.transaction, 0)
        const totalOutcome = transactionList.filter(t => t.transactionType === "outcome").reduce((sum, data) => sum + data.transaction, 0)
        const availableBudget = totalIncome-totalOutcome
        pemasukanShowArea.innerText = `Rp.${totalIncome.toLocaleString()}`
        pengeluaranShowArea.innerText = `Rp.${totalOutcome.toLocaleString()}`
        sisaShowArea.innerText = `Rp.${availableBudget.toLocaleString()}`
        }

    const editTransaction = (id) => {
        const target = transactionList.find(item => item.transactionId === id)

        if (target) {
            editId = id
            document.getElementById('transactionType').value = target.transactionType
            document.getElementById('transaction').value = target.transaction
            document.getElementById('transactionInfo').value = target.transactionInfo

            updateCategory()
            document.getElementById('transactionCategory').value = target.transactionCategory

            document.getElementById('submitTransaction').innerText = "Simpan Perubahan"
            document.getElementById('cancelEdit').hidden = false
        }
    }

    const updateTranscationCat = () => {
        const selectedType = transactionTypeTab.value
        const availCategory = categoryMapList[selectedType]

        if (selectedType === "default") {
            transactionCatTab.disabled = true
        } else {
            transactionCatTab.disabled = false
        }

        const optionsHTML = availCategory.map((cat) => {
            return `<option value="${cat}">${cat}</option>`
        }).join("")

        transactionCatTab.innerHTML = optionsHTML
    }

    const updateTotalCat = () => {
        const selectedType = totalTypeTab.value
        const availCategory = categoryMapInput[selectedType]

        const optionsHTML = availCategory.map((cat) => {
            return `<option value="${cat}">${cat}</option>`
        }).join("")

        totalCatTab.innerHTML = optionsHTML
    }

    const updateCategory = () => {
        const selectedType = typeSelect.value
        const availCategory = categoryMapInput[selectedType]

        const optionsHTML = availCategory.map((cat) => {
            return `<option value="${cat}">${cat}</option>`
        }).join("")

        categorySelect.innerHTML = optionsHTML
    }

    transactionTypeTab.addEventListener('change', () => {
        render()
        updateTranscationCat()
    })

    transactionCatTab.addEventListener('change', () => {
        render()
    })

    sortValue.addEventListener('change', () => {
        render()
    })

    monthFilter.addEventListener('change', () => {
        render()
    })
    
    totalTypeTab.addEventListener('change', () => {
        render()
    })

    totalCatTab.addEventListener('change', () => {
        render()
    })

    resetFilter.addEventListener('click', () => {
        monthFilter.value = ""
        sortValue.value = "newest"
        transactionTypeTab.value = "default"
        transactionCatTab.value = "Semua Jenis"
        transactionCatTab.disabled = true
        render()

    })

    document.getElementById('cancelEdit').addEventListener('click', () => {
        editId = null
        document.getElementById('transaction').value = ""
        document.getElementById('transactionInfo').value = ""
        document.getElementById('submitTransaction').innerText = "submit"
        document.getElementById('cancelEdit').hidden = true
    })

    document.getElementById('submitTransaction').addEventListener('click', () => {
        transacTypeValue = document.getElementById('transactionType').value
        transacCategory = document.getElementById('transactionCategory').value
        transacValue = parseInt(document.getElementById('transaction').value)
        transacInfoValue = document.getElementById('transactionInfo').value

        if (transacTypeValue && transacCategory && !isNaN(transacValue) && transacInfoValue) {
            if (editId) {
                transactionList = transactionList.map(item => {
                    if (item.transactionId === editId) {
                        return { ...item, transactionId: item.transactionId, transactionType: transacTypeValue, transactionCategory: transacCategory, transaction: transacValue, transactionInfo: transacInfoValue }
                    }
                    return item
                })

                editId = null
                document.getElementById('submitTransaction').innerText = "submit"
                document.getElementById('cancelEdit').hidden = true
            }

            else {
                transactionList.push({ transactionId: Date.now(), transactionType: transacTypeValue, transactionCategory: transacCategory, transaction: transacValue, transactionInfo: transacInfoValue })
            }
            render()

            document.getElementById("transaction").value = ""
            document.getElementById("transactionInfo").value = ""
        }
        else {
            alert("Transaksi tidak sah (masukkan angka yang benar)")
        }

    })

    const deleteTransaction = (id) => {
        transactionList = transactionList.filter(item => item.transactionId !== id)
        render()
    }
    updateCategory()
    updateTranscationCat()
    updateTotalCat()
    render()
</script>

</html>
